{% extends 'base.html' %}

{% block title %}Delete Article | Aaj Ka Mudda{% endblock %}

{% block css %}
<style>
    .delete-wrap{
        max-width:640px;
        margin:45px auto;
        background:#fff;
        border:1px solid var(--border);
        border-radius:18px;
        padding:26px;
    }

    .danger-box{
        background:#fef2f2;
        color:#991b1b;
        border:1px solid #fecaca;
        border-radius:14px;
        padding:15px;
        margin:18px 0;
    }

    .delete-btn,
    .cancel-btn{
        border:0;
        border-radius:12px;
        padding:11px 18px;
        font-weight:900;
        display:inline-block;
    }

    .delete-btn{
        background:#dc2626;
        color:#fff;
    }

    .cancel-btn{
        background:#eef2f7;
        color:var(--navy);
    }
</style>
{% endblock %}

{% block content %}
<div class="delete-wrap">
    <h1 class="fw-bold">Delete Article</h1>
    <div class="danger-box">
        Are you sure you want to delete this article?
        <strong>{{ article.title }}</strong>
    </div>
    <form method="post">
        {% csrf_token %}
        <button class="delete-btn" type="submit">Delete</button>
        <a class="cancel-btn ms-2" href="{% url 'dashboard' %}">Cancel</a>
    </form>
</div>
{% endblock %}
