{% extends 'base.html' %}

{% block title %}Login | Aaj Ka Mudda{% endblock %}

{% block css %}
<style>
    .login-wrap{
        max-width:520px;
        margin:40px auto;
        background:#fff;
        border:1px solid var(--border);
        border-radius:20px;
        padding:30px;
        text-align:center;
    }

    .google-login{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        background:#fff;
        border:1px solid #d1d5db;
        border-radius:30px;
        padding:12px 22px;
        font-weight:900;
        color:#111827;
        box-shadow:0 10px 24px rgba(15,23,42,.08);
    }

    .google-icon{
        width:22px;
        height:22px;
        border-radius:50%;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        background:#4285f4;
        font-weight:900;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
    <h1 class="fw-bold mb-3">Login</h1>
    <p class="text-muted mb-4">Continue with your Google account.</p>
    <a class="google-login" href="{% url 'social:begin' 'google-oauth2' %}">
        <span class="google-icon">G</span>
        Continue with Google
    </a>
</div>
{% endblock %}
