{% extends 'base.html' %}

{% block title %}
404 - Page Not Found
{% endblock %}

{% block content %}

<section class="error-page py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8 text-center">

                <h1 class="error-code">

                    404

                </h1>

                <h2 class="mb-4">

                    Oops! Page Not Found

                </h2>

                <p class="mb-4 text-muted">

                    The page you are looking for does not exist
                    or has been removed.

                </p>

                <a href="/"
                   class="btn btn-danger btn-lg">

                    Back To Home

                </a>

            </div>

        </div>

    </div>

</section>

{% endblock %}
