{% extends 'base.html' %}

{% block title %}
Contact Us
{% endblock %}

{% block content %}

<section class="contact-page py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow border-0 p-4">

                    <h1 class="mb-4 text-center">

                        Contact Us

                    </h1>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Your Name

                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter Your Name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Email Address

                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Enter Email">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Subject

                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Subject">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Message

                            </label>

                            <textarea class="form-control"
                                      rows="6"
                                      placeholder="Write Message"></textarea>

                        </div>

                        <button type="submit"
                                class="btn btn-danger w-100">

                            Send Message

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
